<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Security Illustration</title>
<link rel="stylesheet" href="index.css">
</head>

<body>

<div class="scene">

  <!-- Cloud & Shield -->
  <div class="cloud">
    <div class="shield">
      <div class="lock"></div>
    </div>
  </div>

  <!-- Binary Rain -->
  <div class="binary">
    101011010110010101010101010101010101010101010101
  </div>

  <!-- Platform -->
  <div class="platform">

    <!-- Servers -->
    <div class="servers">
      <div class="server"></div>
      <div class="server"></div>
      <div class="server"></div>
    </div>

    <!-- Database -->
    <div class="database">
      <div class="db-lock"></div>
    </div>

    <!-- Laptop -->
    <div class="laptop">
      <div class="screen"></div>
      <div class="base"></div>
    </div>

    <!-- Card -->
    <div class="card"></div>

    <!-- Magnifier -->
    <div class="magnifier"></div>

  </div>
</div>
</body>
</html>
